<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lotto Number Generator</title>
  <link href='/style.css' rel='stylesheet'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="controls">
    <select id="lang-select" class="lang-select">
      <option value="ko">KO</option>
      <option value="en">EN</option>
      <option value="ja">JA</option>
    </select>
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
      <span class="sun-icon">☀️</span>
    </button>
  </div>
  <div class="container">
    <header>
      <h1>Lotto <span class="highlight" data-i18n="title-highlight">Generator</span></h1>
      <p data-i18n="subtitle">Click the button to generate your 6 lucky numbers.</p>
    </header>

    <section id="recent-results" class="latest-result">
      <h3 data-i18n="recent-draws-title">Recent Winning Numbers</h3>
      <div id="winning-numbers-list" class="winning-numbers-list">
        <div class="winning-placeholder" data-i18n="loading">Loading latest numbers...</div>
      </div>
    </section>

    <main>
      <div id="lotto-display" class="lotto-display">
        <!-- Lotto balls will appear here -->
        <div class="placeholder">--</div>
        <div class="placeholder">--</div>
        <div class="placeholder">--</div>
        <div class="placeholder">--</div>
        <div class="placeholder">--</div>
        <div class="placeholder">--</div>
      </div>

      <button id="generate-btn" class="generate-btn" data-i18n="generate-btn">
        Generate Lucky Numbers
      </button>
    </main>

    <footer>
      <p>© 2026 Musical Octo Adventure</p>
    </footer>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
