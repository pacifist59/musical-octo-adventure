<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tire Finder - 내 차에 맞는 최적의 타이어 추천</title>
  <link href='/style.css' rel='stylesheet'>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="controls">
    <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">
      <span class="sun-icon">☀️</span>
    </button>
  </div>
  <div class="container">
    <header>
      <h1>Tire <span class="highlight">Finder</span></h1>
      <p>내 차에 가장 잘 어울리는 타이어를 찾아보세요.</p>
    </header>

    <section class="selection-section">
      <div class="select-group">
        <label for="brand-select">제조사</label>
        <select id="brand-select" class="main-select">
          <option value="" disabled selected>제조사 선택</option>
        </select>
      </div>

      <div class="select-group">
        <label for="model-select">차종</label>
        <select id="model-select" class="main-select" disabled>
          <option value="" disabled selected>차종 선택</option>
        </select>
      </div>

      <div class="select-group">
        <label for="year-select">연식</label>
        <select id="year-select" class="main-select" disabled>
          <option value="" disabled selected>연도 선택</option>
        </select>
      </div>

      <div class="select-group">
        <label for="size-select">규격</label>
        <select id="size-select" class="main-select" disabled>
          <option value="" disabled selected>규격 선택</option>
        </select>
      </div>
    </section>

    <main id="recommendations-container" class="recommendations-container">
      <div class="empty-state">
        <p>차량 정보를 선택하면 최적의 타이어 4종을 가로로 추천해 드립니다.</p>
      </div>
    </main>

    <footer>
      <p>© 2026 Tire Finder - Premium Tire Recommendation</p>
    </footer>
  </div>
  <script defer type="text/javascript" src="/main.js?v=1.0.3"></script>
</body>
</html>
